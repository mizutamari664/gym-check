name: gym-check

on:
  schedule:
    - cron: "*/5 * * * *"   # 5分ごと
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: ライブラリインストール
        run: |
          pip install -r requirements.txt
          playwright install

      - name: 実行
        run: python main.py
